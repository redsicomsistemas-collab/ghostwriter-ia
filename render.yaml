services:
  - type: web
    runtime: python
    name: ghostwriter-ia
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: ghostwriter-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: DATABASE_URL
        value: sqlite:////var/data/ghostwriter.db
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_PROFILE_IDS
        sync: false
      - key: DEFAULT_BRAND_CONTEXT
        value: Escribe en primera persona, con criterio practico y sin sonar corporativo.
      - key: AUTO_MODE_ENABLED
        value: false
      - key: AUTO_PUBLISH_ENABLED
        value: false
      - key: AUTO_CONTENT_FEED_URL
        value: https://news.google.com/rss/search?q=inteligencia+artificial+negocios
      - key: AUTO_CONTENT_TOPICS
        value: ""
      - key: AUTO_CONTENT_PLATFORMS
        value: linkedin,x,instagram
      - key: AUTO_POST_INTERVAL_MINUTES
        value: 480
      - key: AUTO_POST_LIMIT_PER_RUN
        value: 1
