<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ghostwriter IA</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Ghostwriter IA</h1>
        <p>Borradores con tu estilo, ejemplos recuperados y revision humana.</p>
      </div>
      <nav class="tabs" aria-label="Vistas">
        <button class="tab active" data-view="write">Escribir</button>
        <button class="tab" data-view="examples">Ejemplos</button>
        <button class="tab" data-view="drafts">Borradores</button>
      </nav>
    </header>

    <main>
      <section id="write" class="view active">
        <div class="layout two">
          <form id="generate-form" class="panel">
            <div class="panel-head">
              <h2>Crear contenido</h2>
              <span id="generate-status" class="status"></span>
            </div>

            <label>
              Tema o noticia
              <textarea id="topic" rows="7" required placeholder="Pega una noticia, tendencia o idea concreta..."></textarea>
            </label>

            <label>
              Contexto de marca
              <textarea id="brand-context" rows="4" placeholder="Ej. tono directo, practico, profesional, sin sonar corporativo."></textarea>
            </label>

            <div class="field">
              <span>Plataformas</span>
              <div class="checks">
                <label><input type="checkbox" name="platform" value="linkedin" checked /> LinkedIn</label>
                <label><input type="checkbox" name="platform" value="x" checked /> X</label>
                <label><input type="checkbox" name="platform" value="instagram" checked /> Instagram</label>
              </div>
            </div>

            <div class="actions">
              <button type="button" id="ideas-btn" class="secondary">Generar ideas</button>
              <button type="submit">Generar borradores</button>
            </div>
          </form>

          <section class="panel">
            <div class="panel-head">
              <h2>Resultado</h2>
              <button id="refresh-drafts" class="icon-button" title="Actualizar borradores" aria-label="Actualizar borradores">↻</button>
            </div>
            <div id="ideas-output" class="ideas empty">Las ideas apareceran aqui.</div>
            <div id="generated-output" class="draft-grid"></div>
          </section>
        </div>
      </section>

      <section id="examples" class="view">
        <div class="layout two">
          <form id="ingest-form" class="panel">
            <div class="panel-head">
              <h2>Guardar ejemplo</h2>
              <span id="ingest-status" class="status"></span>
            </div>

            <label>
              Plataforma
              <select id="example-platform">
                <option value="linkedin">LinkedIn</option>
                <option value="x">X</option>
                <option value="instagram">Instagram</option>
              </select>
            </label>

            <label>
              Texto del post
              <textarea id="example-text" rows="9" required placeholder="Pega un post real tuyo para que el sistema aprenda tono y estructura..."></textarea>
            </label>

            <label>
              URL opcional
              <input id="example-url" type="url" placeholder="https://..." />
            </label>

            <button type="submit">Guardar ejemplo</button>
          </form>

          <section class="panel">
            <div class="panel-head">
              <h2>Perfil de estilo</h2>
              <span id="profile-status" class="status"></span>
            </div>
            <label>
              Tema para comparar
              <input id="profile-topic" type="text" placeholder="Ej. automatizacion con IA" />
            </label>
            <button id="profile-btn" class="secondary">Ver ejemplos similares</button>
            <div id="profile-output" class="examples-list empty">Aqui veras los ejemplos recuperados.</div>
          </section>
        </div>
      </section>

      <section id="drafts" class="view">
        <section class="panel">
          <div class="panel-head">
            <h2>Borradores guardados</h2>
            <button id="load-drafts" class="secondary">Actualizar</button>
          </div>
          <div id="drafts-list" class="draft-grid"></div>
        </section>
      </section>
    </main>

    <template id="draft-card-template">
      <article class="draft-card">
        <div class="draft-meta">
          <span class="platform"></span>
          <span class="status-pill"></span>
        </div>
        <p class="draft-content"></p>
        <div class="draft-actions">
          <button class="copy-btn secondary" type="button">Copiar</button>
          <button class="approve-btn" type="button">Aprobar</button>
        </div>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
